name: Backport CGroup2 & LXC for Beryllium

on:
  workflow_dispatch:

jobs:
  backport:
    name: Backport Kernel Features
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Kernel Repo
        uses: actions/checkout@v3
        with:
          ref: mainline

      - name: Set Up Git
        run: |
          git config --global user.name "Backport Bot"
          git config --global user.email "bot@example.com"
          git checkout -b lxc-cgroup2-backport

      - name: Clone Upstream Kernel (v4.14)
        run: |
          git clone --depth=1 --branch v4.14 https://github.com/torvalds/linux upstream-kernel

      - name: Backport CGroup v2 Source Code
        run: |
          rsync -av --ignore-existing upstream-kernel/kernel/cgroup/ kernel/cgroup/
          rsync -av --ignore-existing upstream-kernel/include/linux/cgroup* include/linux/
          rsync -av --ignore-existing upstream-kernel/mm/memcontrol.c mm/
          rsync -av --ignore-existing upstream-kernel/include/linux/memcontrol.h include/linux/
          rsync -av --ignore-existing upstream-kernel/fs/proc/ fs/proc/
          rsync -av --ignore-existing upstream-kernel/include/uapi/linux/cgroupstats.h include/uapi/linux/

      - name: Commit and Push Backport Branch
        run: |
          git add kernel/cgroup/ \
                  include/linux/cgroup* \
                  mm/memcontrol.c \
                  include/linux/memcontrol.h \
                  fs/proc/ \
                  include/uapi/linux/cgroupstats.h
          git commit -m "backport: cgroup2, selinux, lxc/docker, nethunter, memory support"
          git push origin lxc-cgroup2-backport


---
