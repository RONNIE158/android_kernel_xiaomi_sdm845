name: Patch Kernel Syscalls (Manual & Auto)

on:
  push:
    branches:
      - lineage-21
  workflow_dispatch:

jobs:
  patch-syscalls:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Kernel Source
        uses: actions/checkout@v3
        with:
          ref: backport-cgroup-lxc

      - name: Apply syscall patches
        shell: bash
        run: |
          echo "Applying syscall patches..."

          mkdir -p include/uapi/linux fs arch/arm64/kernel

          cat > include/uapi/linux/openat2.h << 'EOF'
#ifndef _UAPI_LINUX_OPENAT2_H
#define _UAPI_LINUX_OPENAT2_H
struct open_how {
  __u64 flags;
  __u64 mode;
  __u64 resolve;
};
#endif
EOF

          cat > fs/openat2.c << 'EOF'
// SPDX-License-Identifier: GPL-2.0
#include <linux/syscalls.h>
#include <linux/fs.h>
#include <linux/uaccess.h>
#include <linux/openat2.h>
SYSCALL_DEFINE4(openat2, int, dfd, const char __user *, filename,
                struct open_how __user *, how, size_t, size)
{
  struct open_how k_how;
  if (size != sizeof(struct open_how))
    return -EINVAL;
  if (copy_from_user(&k_how, how, size))
    return -EFAULT;
  return do_sys_open(dfd, filename, k_how.flags, k_how.mode);
}
EOF

          cat > arch/arm64/kernel/syscall_table.S << 'EOF'
.long sys_ni_syscall    /* 223 */
.long sys_openat2       /* 224 */
.long sys_mount_setattr /* 225 */
.long sys_move_mount    /* 226 */
EOF

          grep -q sys_openat2 include/linux/syscalls.h || \
          echo 'asmlinkage long sys_openat2(int dfd, const char __user *filename, struct open_how __user *how, size_t size);' >> include/linux/syscalls.h

          grep -q openat2.o fs/Makefile || \
          echo 'obj-y += openat2.o' >> fs/Makefile

      - name: Commit and Push Changes (Skip if No Changes)
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Patch syscall: openat2, mount_setattr, move_mount"
            git push origin backport-cgroup-lxc
          fi
